<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 60" height="60">
  <!-- Diamond logo scaled to 60px -->
  <g transform="translate(0,0) scale(0.12)">
    <rect x="200" y="0" width="100" height="100" fill="#111111"/>
    <rect x="100" y="100" width="100" height="100" fill="#111111"/>
    <rect x="300" y="100" width="100" height="100" fill="#111111"/>
    <rect x="0"   y="200" width="100" height="100" fill="#111111"/>
    <rect x="400" y="200" width="100" height="100" fill="#111111"/>
    <polygon points="200,250 225,225 250,250 225,275" fill="#333333"/>
    <polygon points="250,250 275,225 300,250 275,275" fill="#333333"/>
    <rect x="100" y="300" width="100" height="100" fill="#111111"/>
    <rect x="300" y="300" width="100" height="100" fill="#111111"/>
    <rect x="200" y="400" width="100" height="100" fill="#111111"/>
  </g>
  <!-- "storm" text -->
  <text x="80" y="44" font-family="'SF Pro Display','Inter','Segoe UI',system-ui,sans-serif" font-size="42" font-weight="700" letter-spacing="2" fill="#111111">STORM</text>
</svg>
