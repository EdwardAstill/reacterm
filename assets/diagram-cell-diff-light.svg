<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <!-- Glow filter for highlighted Storm cells -->
    <filter id="cellGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.51  0 0 0 0 0.667  0 0 0 0 1  0 0 0 0.6 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow for Storm panel -->
    <filter id="panelGlow" x="-3%" y="-3%" width="106%" height="106%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.51  0 0 0 0 0.667  0 0 0 0 1  0 0 0 0.15 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot grid pattern -->
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.6" fill="#1F2328" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#FFFFFF"/>

  <!-- Dot grid background -->
  <rect width="900" height="420" fill="url(#dotGrid)"/>

  <!-- Title section -->
  <text x="450" y="32" text-anchor="middle" fill="#1F2328" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" letter-spacing="3">CELL-LEVEL DIFFING</text>
  <text x="450" y="52" text-anchor="middle" fill="#656D76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11">Only changed cells produce output. Everything else is skipped entirely.</text>

  <!-- ==================== LEFT PANEL: Traditional ==================== -->
  <g transform="translate(60, 68)">
    <rect width="370" height="210" rx="8" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="1"/>

    <!-- Header -->
    <text x="185" y="30" text-anchor="middle" fill="#F87171" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2.5">TRADITIONAL</text>
    <text x="185" y="47" text-anchor="middle" fill="#F87171" opacity="0.6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10">10,000 cells rewritten</text>

    <!-- 8x3 grid of cells — ALL filled red (repainted) -->
    <g transform="translate(89, 62)">
      <!-- Row 0 -->
      <rect x="0"   y="0" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="24"  y="0" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="48"  y="0" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="72"  y="0" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="96"  y="0" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="120" y="0" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="144" y="0" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="168" y="0" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>

      <!-- Row 1 -->
      <rect x="0"   y="24" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="24"  y="24" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="48"  y="24" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="72"  y="24" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="96"  y="24" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="120" y="24" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="144" y="24" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="168" y="24" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>

      <!-- Row 2 -->
      <rect x="0"   y="48" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="24"  y="48" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="48"  y="48" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="72"  y="48" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="96"  y="48" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="120" y="48" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="144" y="48" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
      <rect x="168" y="48" width="18" height="18" rx="2" fill="#F87171" opacity="0.25" stroke="#F87171" stroke-opacity="0.35" stroke-width="0.75"/>
    </g>

    <!-- Footer text -->
    <text x="185" y="192" text-anchor="middle" fill="#F87171" opacity="0.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" letter-spacing="1.5" font-weight="500">EVERY CELL. EVERY FRAME.</text>
  </g>

  <!-- ==================== RIGHT PANEL: Storm ==================== -->
  <g transform="translate(470, 68)" filter="url(#panelGlow)">
    <rect width="370" height="210" rx="8" fill="#F6F8FA" stroke="#82AAFF" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Header -->
    <text x="185" y="30" text-anchor="middle" fill="#82AAFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2.5">STORM</text>
    <text x="185" y="47" text-anchor="middle" fill="#82AAFF" opacity="0.6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10">2 cells written</text>

    <!-- 8x3 grid of cells — mostly empty outlines, 2 highlighted -->
    <g transform="translate(89, 62)">
      <!-- Row 0 -->
      <rect x="0"   y="0" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="24"  y="0" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="48"  y="0" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="72"  y="0" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="96"  y="0" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="120" y="0" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="144" y="0" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="168" y="0" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>

      <!-- Row 1 -->
      <rect x="0"   y="24" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="24"  y="24" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <!-- HIGHLIGHTED CELL 1 (row 1, col 2) -->
      <rect x="48"  y="24" width="18" height="18" rx="2" fill="#82AAFF" fill-opacity="0.3" stroke="#82AAFF" stroke-width="1.5" filter="url(#cellGlow)"/>
      <rect x="72"  y="24" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="96"  y="24" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="120" y="24" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="144" y="24" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="168" y="24" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>

      <!-- Row 2 -->
      <rect x="0"   y="48" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="24"  y="48" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="48"  y="48" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="72"  y="48" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="96"  y="48" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <!-- HIGHLIGHTED CELL 2 (row 2, col 5) -->
      <rect x="120" y="48" width="18" height="18" rx="2" fill="#82AAFF" fill-opacity="0.3" stroke="#82AAFF" stroke-width="1.5" filter="url(#cellGlow)"/>
      <rect x="144" y="48" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
      <rect x="168" y="48" width="18" height="18" rx="2" fill="none" stroke="#D1D9E0" stroke-width="0.75"/>
    </g>

    <!-- Footer text -->
    <text x="185" y="192" text-anchor="middle" fill="#82AAFF" opacity="0.5" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9" letter-spacing="1.5" font-weight="500">97% UNTOUCHED. ZERO WASTE.</text>
  </g>

  <!-- ==================== VS divider ==================== -->
  <text x="450" y="180" text-anchor="middle" fill="#656D76" opacity="0.4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="2">VS</text>

  <!-- ==================== STATS ROW ==================== -->
  <g transform="translate(60, 296)">
    <!-- Stat card 1: 10K cells per frame -->
    <rect width="240" height="58" rx="6" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.75"/>
    <text x="120" y="26" text-anchor="middle" fill="#1F2328" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="700">10K</text>
    <text x="120" y="44" text-anchor="middle" fill="#656D76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" letter-spacing="0.5">cells per frame</text>
  </g>

  <g transform="translate(330, 296)">
    <!-- Stat card 2: ~30 cells written -->
    <rect width="240" height="58" rx="6" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.75"/>
    <text x="120" y="26" text-anchor="middle" fill="#82AAFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="700">~30</text>
    <text x="120" y="44" text-anchor="middle" fill="#656D76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" letter-spacing="0.5">cells written</text>
  </g>

  <g transform="translate(600, 296)">
    <!-- Stat card 3: 97% skip rate -->
    <rect width="240" height="58" rx="6" fill="#F6F8FA" stroke="#D1D9E0" stroke-width="0.75"/>
    <text x="120" y="26" text-anchor="middle" fill="#82AAFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="700">97%</text>
    <text x="120" y="44" text-anchor="middle" fill="#656D76" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" letter-spacing="0.5">skip rate</text>
  </g>

  <!-- ==================== BOTTOM LINE ==================== -->
  <!-- Subtle separator line above bottom text -->
  <line x1="150" y1="370" x2="750" y2="370" stroke="#D1D9E0" stroke-width="0.5" opacity="0.4"/>

  <text x="450" y="392" text-anchor="middle" fill="#656D76" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace" font-size="10" opacity="0.7">output: cursor_move(6,2) + char('&#x2819;') &#x2014; 3 bytes total &#xB7; everything else untouched</text>
</svg>